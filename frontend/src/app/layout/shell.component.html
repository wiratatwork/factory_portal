<div class="toyota-portal-bg font-sans antialiased bg-toyota-mist text-toyota-slate-deep min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 bg-white border border-toyota-border rounded-md px-3 py-2 text-sm">Skip to main content</a>
  <header class="sticky top-0 z-20 bg-white/98 backdrop-blur-xl border-b border-slate-300 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-9 h-9 text-toyota-slate-deep" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <ellipse cx="24" cy="24" rx="22" ry="14" stroke="currentColor" stroke-width="2.5" />
          <ellipse cx="24" cy="24" rx="14" ry="8.5" stroke="currentColor" stroke-width="2.5" />
        </svg>
        <div>
          <p class="text-[11px] uppercase tracking-[0.18em] text-toyota-gray">Toyota Motor Thailand</p>
          <h1 class="text-sm sm:text-base font-semibold">Factory Web Portal</h1>
        </div>
      </div>
      <div class="flex items-center gap-2 sm:gap-3">
        <span class="hidden sm:inline-flex items-center rounded-full bg-emerald-50 text-emerald-700 text-xs font-medium px-2.5 py-1">System Normal</span>
        <button type="button" (click)="signOut()" class="h-9 px-4 rounded-md border border-toyota-border text-sm font-medium text-toyota-slate hover:bg-gray-50 transition-colors duration-200 cursor-pointer flex items-center justify-center">Sign out</button>
      </div>
    </div>
  </header>
  <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
    <router-outlet />
  </main>
</div>
