services:
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - keycloak_data:/opt/keycloak/data
    ports:
      - "7890:8080"
    networks:
      - factory-network

  postgres:
    image: postgres:16-alpine
    container_name: factory-postgres
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: demo
    ports:
      - "5433:5432"
    volumes:
      - factory_postgres_data:/var/lib/postgresql/data
    networks:
      - factory-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory-api
    environment:
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Bff__TokenEncryption__Key: ${BFF_TOKEN_ENCRYPTION_KEY}
      Keycloak__BaseUrl: http://keycloak:8080
      Keycloak__PublicBaseUrl: http://localhost:7890
      Keycloak__Realm: toyota
      Keycloak__ClientId: factory-portal
      Keycloak__RequireHttpsMetadata: "false"
      Bff__PublicBaseUrl: http://localhost:4200
      Bff__SessionIdleMinutes: "30"
      Bff__EnableSilentSso: "false"
      Cors__AllowedOrigins__0: http://localhost:4200
    ports:
      - "5001:5001"
    depends_on:
      keycloak:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - factory-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factory-frontend
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - factory-network

volumes:
  keycloak_data:
  factory_postgres_data:

networks:
  factory-network:
    driver: bridge
