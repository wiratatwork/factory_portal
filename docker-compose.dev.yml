services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/src
      - api_bin:/src/bin
      - api_obj:/src/obj
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
      Bff__PublicBaseUrl: http://localhost:5501
      Cors__AllowedOrigins__0: http://localhost:5501

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5501:5500"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  api_bin:
  api_obj:
  frontend_node_modules:
